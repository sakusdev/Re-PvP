## Example Re-PvP config for early local testing.
## Copy values into BepInEx/config/dev.sakus.repvp.cfg after first launch.

[General]
Enabled = true
EnableHarmonyPatches = false
LogStartupDiagnostics = true

[Debug]
DebugKeysEnabled = true
DebugOverlayEnabled = true
DebugOverlayX = 20
DebugOverlayY = 20
DebugCashAmount = 5000

[Round]
PreparationTime = 30
RoundTimeLimit = 720
ExtractionTime = 90
RequiredCashPercent = 0.6
RequiredCashOverride = 45000

[Hunter]
HunterSpeedMultiplier = 1.15
PulseScanDuration = 4
PulseScanCooldown = 45
PulseScanRange = 40

[Hooks]
## These are tentative. Keep EnableHarmonyPatches=false until exact targets are verified.
PlayerTypeCandidates = PlayerAvatar,PlayerController,PlayerManager,SemiFunc,NetworkPlayer
PlayerMethodCandidates = Start,Awake,OnEnable,Spawn,SpawnPlayer
CashInTypeCandidates = ValuableObject,Valuable,ValuableDirector,ExtractionPoint,ShopManager,StatsManager
CashInMethodCandidates = CashIn,OnCashIn,Sell,AddMoney,AddCash,ValuableCashed
ExtractionTypeCandidates = ExtractionPoint,ExtractionZone,LevelExit,TruckScreen,RunManager,RoundDirector
ExtractionMethodCandidates = ExtractPlayer,OnPlayerEnter,OnTriggerEnter,PlayerExtracted,LeaveLevel

[Extraction]
MinimumHeistersToExtract = 1
